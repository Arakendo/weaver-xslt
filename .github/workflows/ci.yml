name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  build:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        if: runner.os != 'Windows'
        run: npm test

      - name: Test
        if: runner.os == 'Windows'
        id: test_windows
        shell: pwsh
        run: |
          $logDir = Join-Path $env:RUNNER_TEMP 'weaver-xslt-logs'
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $logPath = Join-Path $logDir 'windows-test.log'

          npm test -- --pool=forks --poolOptions.forks.singleFork --no-file-parallelism 2>&1 | Tee-Object -FilePath $logPath
          $exitCode = $LASTEXITCODE

          "log_path=$logPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($exitCode -ne 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'Windows test step failed. Last 200 log lines:'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Get-Content -Path $logPath -Tail 200 | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }

          exit 0

      - name: Upload Windows test log
        if: runner.os == 'Windows' && steps.test_windows.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-log-node-${{ matrix.node }}
          path: ${{ steps.test_windows.outputs.log_path }}
          if-no-files-found: error

      - name: Fail on Windows test failure
        if: runner.os == 'Windows' && steps.test_windows.outputs.exit_code != '0'
        shell: pwsh
        run: exit 1

      - name: Compile benchmark guardrail
        if: runner.os == 'Linux' && matrix.node == 22
        id: vision_benchmark
        shell: bash
        run: |
          report_dir="$RUNNER_TEMP/vision-benchmark"
          mkdir -p "$report_dir"
          report_path="$report_dir/vision-benchmark.json"
          summary_path="$report_dir/vision-benchmark-summary.txt"

          npx tsx scripts/benchmark-compile.ts \
            --synthetic vision-guardrail \
            --compose-summary \
            --summary \
            --out "$report_path" \
            --fail-if-total-ms 2000 \
            --fail-if-compile-ir-ms 500 \
            --fail-if-lower-template-ms 250 \
            --fail-if-template-rules-over 200 \
            --fail-if-xpath-parses-over 2000 \
            --fail-if-dropped-duplicates-below 1000 | tee "$summary_path"
          benchmark_exit_code=${PIPESTATUS[0]}

          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"
          echo "summary_path=$summary_path" >> "$GITHUB_OUTPUT"
          echo "exit_code=$benchmark_exit_code" >> "$GITHUB_OUTPUT"

          exit "$benchmark_exit_code"

      - name: Add benchmark summary
        if: runner.os == 'Linux' && matrix.node == 22 && always() && steps.vision_benchmark.outputs.summary_path != ''
        shell: bash
        run: |
          echo '## Compile benchmark guardrail' >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.vision_benchmark.outputs.exit_code }}" != "0" ]]; then
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo 'Benchmark thresholds exceeded.' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ steps.vision_benchmark.outputs.summary_path }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        if: runner.os == 'Linux' && matrix.node == 22 && always() && steps.vision_benchmark.outputs.report_path != '' && steps.vision_benchmark.outputs.summary_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: vision-compile-benchmark-node-${{ matrix.node }}
          path: |
            ${{ steps.vision_benchmark.outputs.report_path }}
            ${{ steps.vision_benchmark.outputs.summary_path }}
          if-no-files-found: error

      - name: Build
        run: npm run build
